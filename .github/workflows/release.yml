name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm --filter annotation-kit build

      - run: pnpm build

      - name: Package extension
        run: |
          VERSION=${GITHUB_REF_NAME}
          mkdir -p webclip-${VERSION}
          cp -r dist/* webclip-${VERSION}/
          cd webclip-${VERSION}
          zip -r ../webclip-${VERSION}.zip .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: webclip-${{ github.ref_name }}.zip
          generate_release_notes: true